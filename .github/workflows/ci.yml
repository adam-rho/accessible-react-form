name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install site deps
        run: npm ci --prefix site

      - name: Typecheck library
        run: npx tsc --noEmit

      - name: Build library
        run: npm run build-lib

      - name: Build Storybook
        run: npm run build-storybook

      - name: Build site
        # Site build re-runs the storybook build; use the already-built output instead.
        # Site tsc -b runs as part of this step (it imports the built library above).
        run: |
          rm -rf site/public/storybook
          cp -r storybook-static site/public/storybook
          npx tsc -b site
          npx vite build site

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: site/dist
          retention-days: 7
