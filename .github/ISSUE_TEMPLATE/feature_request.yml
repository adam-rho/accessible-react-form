name: Feature request
description: Suggest a new feature or change
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case before proposing a solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How might this work? An API sketch is helpful.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds, related libraries, things you've already tried.
