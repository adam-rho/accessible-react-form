<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="An accessible, minimal React form library built on react-hook-form and yup. WCAG-compliant by default." />
    <title>accessible-react-form — minimal, accessible React forms</title>
    <script>
      // Set theme before paint to avoid flash
      (function() {
        const stored = localStorage.getItem('theme')
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        const dark = stored === 'dark' || (stored !== 'light' && systemDark)
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
